name: Daily profile README update

# Renders README.md at the repo ROOT (github.com/yoshibase).
# Requires secret PUBLIC_REPO_TOKEN (PAT with Contents read/write).

on:
  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-profile-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      REPO_DIR: ${{ github.workspace }}
      DATA_DIR: ${{ github.workspace }}/data
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch today's repo-of-day / trending picks
        working-directory: scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 fetch_trending.py "$DATA_DIR"

      - name: Generate banner + card assets
        working-directory: scripts
        run: |
          mkdir -p "$REPO_DIR/assets/generated"
          python3 generate_banner.py "$REPO_DIR/assets/generated"
          python3 generate_cards.py "$REPO_DIR/assets/generated" --data-dir "$DATA_DIR"

      - name: Re-render root README.md from template + today's data
        working-directory: scripts
        run: python3 render_readme.py "$REPO_DIR" --data-dir "$DATA_DIR"

      - name: Commit (1-3 increments) and push
        working-directory: scripts
        env:
          GIT_AUTHOR_NAME: yoshibase
          GIT_AUTHOR_EMAIL: yoshi@yoshibase.com
          GIT_COMMITTER_NAME: yoshibase
          GIT_COMMITTER_EMAIL: yoshi@yoshibase.com
        run: python3 commit_booster.py "$REPO_DIR"
